<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FullShot — Settings</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="card">
      <h1><span class="logo"></span> FullShot settings</h1>

      <label class="row">
        <span class="label">Default export format</span>
        <select id="defaultFormat">
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
          <option value="pdf">PDF</option>
        </select>
      </label>

      <label class="row">
        <span class="label">JPEG quality <small id="jpegVal"></small></span>
        <input id="jpegQuality" type="range" min="0.5" max="1" step="0.01" />
      </label>

      <label class="row">
        <span class="label">Auto-download after capture</span>
        <input id="autoDownload" type="checkbox" />
      </label>

      <label class="row">
        <span class="label">Filename template</span>
        <input id="filenameTemplate" type="text" spellcheck="false" />
      </label>
      <p class="hint">Tokens: <code>{host}</code> <code>{title}</code> <code>{timestamp}</code> <code>{date}</code> <code>{time}</code></p>

      <label class="row">
        <span class="label">Settle delay per scroll step (ms)</span>
        <input id="settleDelayMs" type="number" min="0" max="2000" step="10" />
      </label>
      <p class="hint">Higher = more reliable on lazy-loaded pages, but slower.</p>

      <p id="saved" class="saved" hidden>Saved ✓</p>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
